services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-furlong}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-furlong}
      POSTGRES_DB: ${POSTGRES_DB:-furlong}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro

  scraper:
    build:
      context: .
      dockerfile: scraper/Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-furlong}:${POSTGRES_PASSWORD:-furlong}@db:5432/${POSTGRES_DB:-furlong}
    depends_on:
      - db

volumes:
  postgres_data:
